<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }
    #video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 3px solid #4A90E2;
    }
    canvas { display: none; }
    #status {
      font-size: 15px;
      color: #555;
      text-align: center;
      padding: 0 10px;
    }
    #btn-scan {
      padding: 12px 28px;
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <p id="status">Натисніть кнопку, щоб розпочати сканування</p>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <button id="btn-scan">📷 Сканувати QR-код</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const btnScan = document.getElementById('btn-scan');

    let scanning = false;
    let stream = null;
    let animationId = null;

    btnScan.addEventListener('click', async () => {
      status.textContent = '⏳ Запит доступу до камери...';
      try {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: 'environment' } }
          });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
        }
        video.srcObject = stream;
        await video.play();
        scanning = true;
        status.textContent = '🔍 Наведіть камеру на QR-код...';
        btnScan.style.display = 'none';
        requestAnimationFrame(scanFrame);
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          status.textContent = '❌ Доступ до камери заборонено. Дозвольте доступ у налаштуваннях браузера.';
        } else if (err.name === 'NotFoundError') {
          status.textContent = '❌ Камера не знайдена.';
        } else {
          status.textContent = '❌ Помилка: ' + err.message;
        }
      }
    });

    function scanFrame() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'dontInvert'
        });
        if (code) {
          navigateToUrl(code.data);
          return;
        }
      }
      animationId = requestAnimationFrame(scanFrame);
    }

    function navigateToUrl(url) {
      scanning = false;
      stopCamera();
      status.textContent = '✅ QR-код зчитано! Переходимо...';
      window.top.location.href = url;
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }
  </script>
</body>
</html>
